name: projet_app_annecdote
description: Une application Flutter

publish_to: 'none' # Pour ne pas publier ce projet sur pub.dev

version: 1.4.0+8

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  flutter_localizations:
    sdk: flutter
    

  cupertino_icons: ^1.0.2
  intl: ^0.20.2  # ← Ajout de la dépendance pour gérer les dates
  http: ^1.1.0
  shared_preferences: 2.5.4
  google_mobile_ads: ^5.1.0
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/exoplanets.json
